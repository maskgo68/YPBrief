services:
  ypbrief:
    image: supergo6/ypbrief:latest
    container_name: ypbrief
    restart: unless-stopped
    environment:
      - YPBRIEF_ENV_FILE=/app/data/key.env
      - SCHEDULER_ENABLED=true
      - YPBRIEF_DB_PATH=/app/data/ypbrief.db
      - YPBRIEF_EXPORT_DIR=/app/exports
      - YPBRIEF_LOG_DIR=/app/logs
    ports:
      - "48787:48787"
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
    command: ["python", "-m", "uvicorn", "ypbrief_api.app:app", "--host", "0.0.0.0", "--port", "48787"]
